<!DOCTYPE html>

<head>

<title>Davide Luchi – Consegne Settimanali</title>

<style>

body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background:#eef4ff;
    margin:0;
}

/* container */

.container{
    max-width:900px;
    margin:auto;
    padding:40px;
}

/* header */

header{
    margin-bottom:50px;
}

h1{
    font-size:2.2em;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
}

/* section */

h2{
    margin-bottom:20px;
}

/* post cards */

.post{
    background:white;
    padding:20px;
    border-radius:8px;
    margin-bottom:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
    transition:all 0.15s ease;
}

.post:hover{
    transform:translateY(-3px);
    box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

/* link */

.post a{
    text-decoration:none;
    font-weight:600;
    color:#0366d6;
    font-size:1.1em;
}

.post a:hover{
    text-decoration:underline;
}

/* date */

.date{
    margin-top:5px;
    font-size:0.85em;
    color:#888;
}

/* footer */

footer{
    margin-top:60px;
    padding-top:20px;
    border-top:1px solid #ddd;
    font-size:0.9em;
    color:#777;
}

</style>

</head>

</html>
